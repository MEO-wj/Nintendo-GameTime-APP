services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nintendo
      POSTGRES_PASSWORD: nintendo_pass
      POSTGRES_DB: nintendo_gametime
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nintendo -d nintendo_gametime"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      target: api
    environment:
      NODE_ENV: development
      PORT: "4000"
      STORAGE_MODE: postgres
      DATABASE_URL: postgres://nintendo:nintendo_pass@postgres:5432/nintendo_gametime
      JWT_SECRET: docker_jwt_secret_change_me
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      OTP_EXPIRES_MINUTES: "10"
      OTP_DEV_CODE: "000000"
      INTERNAL_SYNC_TOKEN: internal_sync_token_change_me
      NINTENDO_MOCK: "false"
      CATALOG_REFRESH_INTERVAL_MS: "21600000"
      CRAWLER_DISCOVER_INTERVAL_MS: "43200000"
      CRAWLER_PRICE_REFRESH_INTERVAL_MS: "7200000"
      ALERT_FAIL_THRESHOLD: "3"
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: ""
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('node:http').get('http://localhost:4000/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    ports:
      - "3080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:4000
      SYNC_INTERVAL_MS: "300000"
      INTERNAL_SYNC_TOKEN: internal_sync_token_change_me
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
